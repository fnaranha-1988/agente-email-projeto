name: Analisar Emails

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

permissions:
  contents: write
  issues: write

jobs:
  analisar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install PyGithub openai pandas openpyxl tabulate

      - name: Executar análise
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/analisar_emails.py

      - name: Salvar Excel como artefato
        uses: actions/upload-artifact@v4
        with:
          name: painel-email-projetos
          path: painel_email_projetos.xlsx
